<script id='tmpl_patient_appointments' type="x-tmpl-mustache">
    <div class="patient-appointments-card">
        <div class="patient-appointments-title">Appointments</div>

        <div class="patient-appointments-section">
            <div class="patient-appointments-section-title">Future</div>
            <ul class="patient-appointments-list">
                {{#future_appointments}}
                    <li start="{{start}}" appointmentID="{{id}}" resourceId="{{resourceId}}" class="patient_appointment patient-appointments-item {{#is_cancelled}}patient-appointment-cancelled{{/is_cancelled}}" style="border-left-color:{{itemBorderColor}}">
                        <div class="patient-appointments-date">{{strStart}}</div>
                        <div class="patient-appointments-service">{{service}}{{#is_cancelled}} <span class="patient-appointments-status">(Cancelled)</span>{{/is_cancelled}}</div>
                        <div class="patient-appointments-meta">with {{resourceName}} @ {{clinicName}}</div>
                        {{#cancel_reason}}<div class="patient-appointments-reason">Reason: {{cancel_reason}}</div>{{/cancel_reason}}
                    </li>
                {{/future_appointments}}
                {{^future_appointments}}
                    <li class="patient-appointments-empty">No future appointments</li>
                {{/future_appointments}}
            </ul>
        </div>

        <div class="btn-group btn-group-justified patient-appointments-book" role="group">
            <a href="index.php?com=calendar&view=calendar" target="calendar" class="btn btn-success bookAppointment" role="button">Book appointment</a>
        </div>

        <div class="patient-appointments-section">
            <div class="patient-appointments-section-title">Past</div>
            <ul class="patient-appointments-list">
                {{#past_appointments}}
                    <li start="{{start}}" appointmentID="{{id}}" resourceId="{{resourceId}}" class="patient_appointment patient-appointments-item {{#is_cancelled}}patient-appointment-cancelled{{/is_cancelled}}" style="border-left-color:{{itemBorderColor}}">
                        <div class="patient-appointments-date">{{strStart}}</div>
                        <div class="patient-appointments-service">{{service}}{{#is_cancelled}} <span class="patient-appointments-status">(Cancelled)</span>{{/is_cancelled}}</div>
                        <div class="patient-appointments-meta">with {{resourceName}} @ {{clinicName}}</div>
                        {{#cancel_reason}}<div class="patient-appointments-reason">Reason: {{cancel_reason}}</div>{{/cancel_reason}}
                    </li>
                {{/past_appointments}}
                {{^past_appointments}}
                    <li class="patient-appointments-empty">No past appointments</li>
                {{/past_appointments}}
            </ul>
        </div>
    </div>
</script>
